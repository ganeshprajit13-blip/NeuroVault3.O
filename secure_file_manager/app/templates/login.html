{% extends "base.html" %}

{% block content %}
<div class="auth-container">
    <div class="auth-card auth-login-pro">
        <div class="auth-brand-panel">
            <div class="brand-logo-wrap">
                <img src="{{ url_for('static', filename='images/neuravault-logo.png') }}" alt="NeuraVault Logo" class="brand-logo-img">
            </div>
            <h2><i class="fas fa-sign-in-alt"></i> Welcome Back</h2>
            <p class="text-muted mb-3">Secure file storage, sharing and access control - all in one place.</p>
            <div class="trust-badges">
                <span><i class="fas fa-lock"></i> End-to-end encryption</span>
                <span><i class="fas fa-user-shield"></i> Role-based access</span>
                <span><i class="fas fa-bolt"></i> Fast secure sharing</span>
            </div>
        </div>
        <div class="auth-form-panel">
            <form method="POST">
                <div class="form-group">
                    <label for="username" class="form-label"><i class="fas fa-user"></i> Username</label>
                    <input type="text" class="form-control" id="username" name="username" placeholder="Enter your username" required>
                </div>
                <div class="form-group">
                    <label for="password" class="form-label"><i class="fas fa-lock"></i> Password</label>
                    <div class="password-input-wrap">
                        <input type="password" class="form-control pe-5" id="password" name="password" placeholder="Enter your password" required>
                        <button type="button" class="password-toggle-btn" id="password-toggle" aria-label="Show password" aria-pressed="false">
                            <i class="fas fa-eye"></i>
                        </button>
                    </div>
                </div>
                <button type="submit" class="btn btn-primary mt-2 w-100"><i class="fas fa-arrow-right"></i> Login</button>
            </form>

            <div class="social-login-block">
                <div class="social-divider"><span>Or continue with</span></div>
                <div class="social-circle-wrap">
                    <a
                        href="{{ url_for('auth.oauth_google') }}"
                        class="social-circle-btn google-circle-btn"
                        title="{% if oauth_google_enabled %}Continue with Google{% else %}Google OAuth not configured{% endif %}"
                        aria-label="Sign in with Google"
                    >
                        <i class="fab fa-google"></i>
                    </a>
                    <a
                        href="{{ url_for('auth.oauth_facebook') }}"
                        class="social-circle-btn facebook-circle-btn"
                        title="{% if oauth_facebook_enabled %}Continue with Facebook{% else %}Facebook OAuth not configured{% endif %}"
                        aria-label="Sign in with Facebook"
                    >
                        <i class="fab fa-facebook-f"></i>
                    </a>
                    <a
                        href="{{ url_for('auth.oauth_apple') }}"
                        class="social-circle-btn apple-circle-btn"
                        title="Continue with Apple"
                        aria-label="Sign in with Apple"
                    >
                        <i class="fab fa-apple"></i>
                    </a>
                </div>
                <div class="social-label-row">
                    <span>Google</span>
                    <span>Facebook</span>
                    <span>Apple</span>
                </div>
            </div>

            <div class="auth-footer">
                <a href="{{ url_for('auth.forgot_password') }}" class="text-decoration-none d-block"><i class="fas fa-redo"></i> Forgot Password?</a>
                <hr class="my-3">
                <p class="mb-2">Don't have an account?</p>
                <a href="{{ url_for('auth.register') }}" class="text-decoration-none"><i class="fas fa-user-plus"></i> Register now</a>
            </div>
        </div>
    </div>
</div>
<script>
document.addEventListener('DOMContentLoaded', function () {
    var passwordInput = document.getElementById('password');
    var toggleBtn = document.getElementById('password-toggle');
    if (!passwordInput || !toggleBtn) return;

    toggleBtn.addEventListener('click', function () {
        var isPassword = passwordInput.getAttribute('type') === 'password';
        passwordInput.setAttribute('type', isPassword ? 'text' : 'password');
        toggleBtn.setAttribute('aria-pressed', isPassword ? 'true' : 'false');
        toggleBtn.setAttribute('aria-label', isPassword ? 'Hide password' : 'Show password');
        toggleBtn.innerHTML = isPassword
            ? '<i class="fas fa-eye-slash"></i>'
            : '<i class="fas fa-eye"></i>';
    });
});
</script>
{% endblock %}
