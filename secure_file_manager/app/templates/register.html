{% extends "base.html" %}

{% block content %}
<div class="auth-container">
    <div class="auth-card">
        <h2><i class="fas fa-user-plus"></i> Create Account</h2>
        <form method="POST">
            <div class="form-group">
                <label for="username" class="form-label"><i class="fas fa-user"></i> Username</label>
                <input type="text" class="form-control" id="username" name="username" placeholder="Enter your username" required>
            </div>
            <div class="form-group">
                <label for="email" class="form-label"><i class="fas fa-envelope"></i> Email</label>
                <input type="email" class="form-control" id="email" name="email" placeholder="Enter your email" required>
            </div>
            <div class="form-group">
                <label for="password" class="form-label"><i class="fas fa-lock"></i> Password</label>
                <input type="password" class="form-control" id="password" name="password" placeholder="Enter a strong password" required>
            </div>
            <button type="submit" class="btn btn-primary mt-2"><i class="fas fa-arrow-right"></i> Register</button>
        </form>
        <div class="auth-footer">
            <p class="mb-0">Already have an account?</p>
            <a href="{{ url_for('auth.login') }}" class="text-decoration-none"><i class="fas fa-sign-in-alt"></i> Login here</a>
        </div>
    </div>
</div>
{% endblock %}
