{% extends "base.html" %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <h2>Verify your account</h2>
        <p class="text-muted">Enter the one-time code sent to your email.</p>
        <form method="POST" action="{{ url_for('auth.verify_otp_route', user_id=user_id) }}">
            <div class="mb-3">
                <label for="otp" class="form-label">OTP code</label>
                <input type="text" class="form-control" id="otp" name="otp" required autocomplete="one-time-code">
            </div>
            <button type="submit" class="btn btn-primary">Verify</button>
        </form>
        <p class="mt-3"><a href="{{ url_for('auth.login') }}">Back to login</a></p>
    </div>
</div>
{% endblock %}
